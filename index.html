<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>OMAR Eto - AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🔥 OMAR Eto - لعب ضد AI 🔥</h1>

<div id="timer">04:00</div>

<div class="scoreboard">
  <div>🔴 أنت: <span id="playerScore">0</span></div>
  <div>🔵 AI: <span id="aiScore">0</span></div>
</div>

<div class="field" id="field">
  <div class="goal goal-left"></div>
  <div class="goal goal-right"></div>
  <div class="player" id="player"></div>
  <div class="ai" id="ai"></div>
  <div class="ball" id="ball"></div>
</div>

<div class="buttons">
  <button onclick="startMatch()">ابدأ ماتش</button>
  <button onclick="resetGame()">Reset</button>
</div>

<script src="script.js"></script>
</body>
</html>
